name: IndexNow

on:
  push:
    branches: [master]
    paths:
      - '**/*.html'
      - 'assets/**'
      - 'google-feed.xml'
      - 'indexnow-key.txt'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify SEO files
        run: npm run seo:check && npm run seo:sitemap:check
      - name: Submit URLs to IndexNow
        run: npm run indexnow
