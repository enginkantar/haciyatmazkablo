<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme Başarısız | Hacıyatmaz Kablo</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Mobil hız: CDN preconnect -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #0b0b0b; color: #fff; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: system-ui, sans-serif; }
    .card-error { background: #141414; border: 1px solid #1a1a1a; border-radius: 20px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; }
    .icon-wrap { width: 80px; height: 80px; border-radius: 50%; background: rgba(220, 53, 69, 0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 2rem; color: #dc3545; }
    .icon-wrap::after { content: "✕"; font-size: 2rem; color: #dc3545; }
    .icon-wrap i { position: absolute; }
    .icon-wrap i.fa-loaded { position: static; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p.sub { color: #aaa; font-size: 0.95rem; margin-bottom: 8px; }
    .reason-box { background: #1a1a1a; border-left: 3px solid #ffc107; border-radius: 10px; padding: 12px 16px; font-size: 0.88rem; color: #ccc; margin-bottom: 20px; text-align: left; }
    .hint { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    .btn-retry { background: #ffc107; color: #000; font-weight: 700; border: none; border-radius: 10px; padding: 12px 28px; text-decoration: none; display: inline-block; }
    .btn-retry:hover { background: #ffca28; color: #000; }
    .alt-card-hint { font-size: 0.8rem; color: #888; margin-top: 10px; }
    .wa-link { margin-top: 16px; display: block; color: #aaa; font-size: 0.85rem; text-decoration: none; }
    .wa-link:hover { color: #25d366; }
  </style>
</head>
<body>
  <div class="card-error">
    <div class="icon-wrap" id="iconWrap">
      <i class="fas fa-times"></i>
    </div>

    <h1>😔 Ödeme Tamamlanamadı</h1>
    <p class="sub">
      İşlem sırasında birçok sistemden birinde sorun oluştu.<br>
      <strong>Hiçbir ücret tahsil edilmedi.</strong>
    </p>

    <div class="reason-box" id="reasonBox" style="display:none">
      <span id="reasonText"></span>
    </div>

    <p class="hint">
      Sorun devam ederse WhatsApp üzerinden hızlıca sipariş verebilirsiniz.
    </p>

    <a href="/" class="btn-retry">
      <i class="fas fa-redo" style="margin-right:6px;"></i>Tekrar Dene
    </a>
    <p class="alt-card-hint">Farklı bir kart ile de tekrar deneyebilirsiniz.</p>

    <a href="https://wa.me/905534759032?text=Ödeme%20işleminde%20sorun%20yaşıyorum,%20yardımcı%20olur%20musunuz?"
       class="wa-link"
       target="_blank"
       rel="noopener noreferrer">
      <i class="fab fa-whatsapp" style="color:#25d366;"></i> WhatsApp ile sipariş ver
    </a>
  </div>

  <script>
    window.addEventListener('load', function () {
      const icon = document.querySelector('#iconWrap i');
      if (icon && getComputedStyle(icon).fontFamily.includes('Font Awesome')) {
        icon.classList.add('fa-loaded');
      }
    });

    const REASONS = {
      payment_failed:  'Kartınız bankanız tarafından reddedildi. Kart bilgilerinizi, ödeme onaylarının açık olduğunu ve limitinizi kontrol edip tekrar deneyebilirsiniz.',
      expired:         'Ödeme sayfasında çok beklediniz ve oturum süresi doldu. Lütfen tekrar başlatın.',
      invalid:         'İşlem geçersiz sayıldı. Sayfayı yenileyip tekrar deneyin.',
      sig_invalid:     'Güvenlik doğrulaması başarısız oldu. Endişelenmeyin — bu sizden kaynaklı değil.',
      amount_mismatch: 'Tutar uyuşmazlığı tespit edildi. Güvenliğiniz için işlem durduruldu.',
      no_token:        'Oturum bilgisi eksik. Tarayıcıyı yenileyip tekrar deneyin.',
      config:          'Sistemde geçici bir sorun oluştu. Lütfen WhatsApp üzerinden ulaşın.',
      retrieve_error:  'Ödeme doğrulama sırasında geçici bir bağlantı hatası oluştu. Tekrar deneyin.',
      parse_error:     'İstek işlenirken sorun oluştu. Tekrar deneyin.',
    };

    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    if (reason && REASONS[reason]) {
      document.getElementById('reasonText').textContent = REASONS[reason];
      document.getElementById('reasonBox').style.display = 'block';
    }
  </script>
</body>
</html>
